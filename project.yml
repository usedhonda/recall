name: recall
include:
  - path: .local/project.yml
    required: false
options:
  bundleIdPrefix: com.example
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "15.0"

packages:
  FluidAudio:
    url: https://github.com/FluidInference/FluidAudio.git
    from: "0.7.9"

settings:
  base:
    MARKETING_VERSION: "0.1.0"
    CURRENT_PROJECT_VERSION: "1"
    SWIFT_VERSION: "5.9"

schemes:
  recall:
    build:
      targets:
        recall: all
    run:
      config: Debug

targets:
  recall:
    type: application
    platform: iOS
    sources:
      - recall
      - Shared
    entitlements:
      path: recall/Resources/recall.entitlements
      properties:
        com.apple.developer.healthkit: true
        com.apple.developer.healthkit.background-delivery: true
        com.apple.security.application-groups:
          - group.com.example.recall
    attributes:
      SystemCapabilities:
        com.apple.HealthKit:
          enabled: true
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.example.recall
        CODE_SIGN_STYLE: Automatic
        TARGETED_DEVICE_FAMILY: "1"
        SDKROOT: iphoneos
        SUPPORTS_MACCATALYST: false
    dependencies:
      - package: FluidAudio
        product: FluidAudio
      - sdk: HealthKit.framework
      - sdk: CoreLocation.framework
      - target: RecordingControl
        embed: true
    info:
      path: recall/Resources/Info.plist
      properties:
        CFBundleDisplayName: recall
        CFBundleShortVersionString: $(MARKETING_VERSION)
        CFBundleVersion: $(CURRENT_PROJECT_VERSION)
        UILaunchScreen: {}
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
        NSMicrophoneUsageDescription: "recall continuously records audio for lifelogging. Only voice segments are saved."
        NSLocalNetworkUsageDescription: "Connect to VoiceLog server on local network for audio upload."
        NSLocationWhenInUseUsageDescription: "recall uses your location for lifelogging telemetry."
        NSLocationAlwaysAndWhenInUseUsageDescription: "recall tracks your location in the background for continuous lifelogging."
        NSHealthShareUsageDescription: "recall reads health data (steps, heart rate, sleep, workouts) for lifelogging telemetry."
        NSHealthUpdateUsageDescription: "recall does not write any health data."
        UIBackgroundModes:
          - audio
          - location
        ITSAppUsesNonExemptEncryption: false
        NSAppTransportSecurity:
          NSAllowsLocalNetworking: true
          NSAllowsArbitraryLoads: false
          NSExceptionDomains:
            ts.net:
              NSExceptionAllowsInsecureHTTPLoads: true
              NSExceptionRequiresForwardSecrecy: false
              NSIncludesSubdomains: true
            192.0.2.10:
              NSExceptionAllowsInsecureHTTPLoads: true
              NSExceptionRequiresForwardSecrecy: false

  RecordingControl:
    type: app-extension
    platform: iOS
    deploymentTarget: "18.0"
    sources:
      - RecordingControl
      - Shared
    entitlements:
      path: RecordingControl/RecordingControl.entitlements
      properties:
        com.apple.security.application-groups:
          - group.com.example.recall
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.example.recall.RecordingControl
        CODE_SIGN_STYLE: Automatic
        TARGETED_DEVICE_FAMILY: "1"
        SDKROOT: iphoneos
        SWIFT_VERSION: "5.9"
    info:
      path: RecordingControl/Info.plist
      properties:
        CFBundleDisplayName: RecordingControl
        CFBundleShortVersionString: $(MARKETING_VERSION)
        CFBundleVersion: $(CURRENT_PROJECT_VERSION)
        NSExtension:
          NSExtensionPointIdentifier: com.apple.widgetkit-extension
