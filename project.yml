name: recai
include:
  - path: .local/project.yml
    required: false
options:
  bundleIdPrefix: com.example
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "15.0"

packages:
  FluidAudio:
    url: https://github.com/FluidInference/FluidAudio.git
    from: "0.7.9"

settings:
  base:
    MARKETING_VERSION: "0.1.0"
    CURRENT_PROJECT_VERSION: "1"
    SWIFT_VERSION: "5.9"

schemes:
  recai:
    build:
      targets:
        recai: all
    run:
      config: Debug

targets:
  recai:
    type: application
    platform: iOS
    sources:
      - recai
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.example.recai
        CODE_SIGN_STYLE: Automatic
        TARGETED_DEVICE_FAMILY: "1"
        SDKROOT: iphoneos
        SUPPORTS_MACCATALYST: false
    dependencies:
      - package: FluidAudio
        product: FluidAudio
    info:
      path: recai/Resources/Info.plist
      properties:
        CFBundleDisplayName: recai
        CFBundleShortVersionString: $(MARKETING_VERSION)
        CFBundleVersion: $(CURRENT_PROJECT_VERSION)
        UILaunchScreen: {}
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
        NSMicrophoneUsageDescription: "recai continuously records audio for lifelogging. Only voice segments are saved."
        NSLocalNetworkUsageDescription: "Connect to VoiceLog server on local network for audio upload."
        UIBackgroundModes:
          - audio
        ITSAppUsesNonExemptEncryption: false
        NSAppTransportSecurity:
          NSAllowsLocalNetworking: true
          NSAllowsArbitraryLoads: false
          NSExceptionDomains:
            ts.net:
              NSExceptionAllowsInsecureHTTPLoads: true
              NSExceptionRequiresForwardSecrecy: false
              NSIncludesSubdomains: true
            192.0.2.10:
              NSExceptionAllowsInsecureHTTPLoads: true
              NSExceptionRequiresForwardSecrecy: false
